<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Platformer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
        }

        #gameCanvas {
            background-color: #000; /* Replaced by procedural drawing */
            display: block;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .signature {
            margin-top: 10px;
            font-size: 11px;
            color: #555;
            text-align: right;
            width: 800px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="450"></canvas>
    <div class="signature">Created by Stonedhawk (Rahul)</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Input state
        const keys = { left: false, right: false, jump: false };

        let gameState = 'TITLE_SCREEN'; // TITLE_SCREEN, PLAYING, LEVEL_COMPLETE, GAME_OVER, WIN

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (gameState === 'TITLE_SCREEN') {
                    currentLevelIndex = 0;
                    score = 0;
                    coinsCount = 0;
                    lives = 3;
                    loadLevel(currentLevelIndex);
                    gameState = 'PLAYING';
                    keys.jump = false;
                    return;
                } else if (gameState === 'LEVEL_COMPLETE') {
                    currentLevelIndex++;
                    if (currentLevelIndex >= levels.length) {
                        gameState = 'WIN';
                    } else {
                        loadLevel(currentLevelIndex);
                        gameState = 'PLAYING';
                    }
                    keys.jump = false;
                    return;
                } else if (gameState === 'GAME_OVER' || gameState === 'WIN') {
                    score = 0;
                    coinsCount = 0;
                    lives = 3;
                    currentLevelIndex = 0;
                    loadLevel(currentLevelIndex);
                    gameState = 'PLAYING';
                    keys.jump = false;
                    return;
                }
            }

            if (gameState === 'PLAYING') {
                if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = true;
                if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = true;
                if (e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') {
                    keys.jump = true;
                    e.preventDefault();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = false;
            if (e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') keys.jump = false;
        });

        // Game Constants
        const GRAVITY = 0.6;
        const TERMINAL_VELOCITY = 10;
        const WALK_SPEED = 4;
        const JUMP_VELOCITY = -12;
        const TILE_SIZE = 32;

        // Globals
        let score = 0;
        let coinsCount = 0;
        let lives = 3;
        let frameCount = 0;

        let currentLevelIndex = 0;
        let levelName = '';
        let levelFrames = 0;
        let currentLevelEnemiesKilled = 0;
        let currentLevelCoins = 0;
        let levelStats = { enemies: 0, coins: 0, time: 0, timeBonus: 0, levelBonus: 0, totalScore: 0 };

        const player = {
            x: 100, y: 100, startX: 100, startY: 100,
            width: 32, height: 40, vx: 0, vy: 0,
            grounded: false, invincibleTimer: 0,
            coyoteTimer: 0, facing: 1
        };

        const camera = { x: 0, y: 0 };
        
        const level1 = [
            "..............................................................",
            "..............................................................",
            "..............................................................",
            "..............................................................",
            "..............................................................",
            ".............................................C.......D........",
            ".......P.....................C...C..........GGG.....GGG.......",
            "......GGG...................GGG.GGG...........................",
            "......................C..................E....................",
            "...G.................GGG................GGG...................",
            ".......S....E.......................G..........S..............",
            "GGGGGGGGGGGGGGGG.GG.GGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGG",
            "################.##.##########################################",
            "################.##.##########################################",
            "################.##.##########################################"
        ];

        const level2 = [
            "..............................................................",
            "..............................................................",
            "............S..........C.....C...................C.......D....",
            "..P........GGG........GGG...GGG..................GGG....GGG...",
            "..G.................C................E........................",
            ".........E.........GG.............GGGGGG...S..................",
            "........GGG..........S....................GGG.................",
            "....C.............GGGGGG.....................C................",
            "..GGG.....................C...S...C.........GGG...............",
            ".......S.......S.........GGGGGGGGGGG.............S....S.......",
            "GGGGGGGGGGGGGGGGGG...GG...............GG...GGGGGGGGGGGGGGGGGG.",
            "##################...##...............##...##################.",
            "##################...##...............##...##################.",
            "##################...##...............##...##################.",
            "##################...##...............##...##################."
        ];

        const level3 = [
            "..............................................................",
            "...................................................C.....D....",
            ".......................................E..........GGG...GGG...",
            "....................C.........C.......GGG.....................",
            "..P........E.......GGG.......GGG................C.............",
            "..G.......GGG.................................GGGGG...........",
            "......................S........S..............................",
            "....C....C..........GGGGG....GGGGG......E.....................",
            "..GGGGG.GGGGG..........................GGG............S.......",
            "................S.................................GGGGGGG.....",
            "..............GGGGG.........C......C..........................",
            "..........................GGGGG..GGGGG........................",
            "..............................................................",
            "..............................................................",
            ".............................................................."
        ];

        const levels = [level1, level2, level3];
        const levelNames = ['Level 1: Green Hills', 'Level 2: Underground', 'Level 3: Sky Fortress'];

        let map = [], coinsList = [], enemiesList = [], door = null;
        let levelWidth = 0, levelHeight = 0;

        function loadLevel(index) {
            let levelData = levels[index];
            levelName = levelNames[index];
            map = [];
            coinsList = [];
            enemiesList = [];
            door = null;
            levelFrames = 0;
            currentLevelEnemiesKilled = 0;
            currentLevelCoins = 0;
            
            levelHeight = levelData.length;
            levelWidth = levelData[0].length;
            for (let y = 0; y < levelHeight; y++) {
                let row = [];
                for (let x = 0; x < levelWidth; x++) {
                    let tile = levelData[y][x];
                    if (tile === 'P') {
                        player.startX = x * TILE_SIZE;
                        player.startY = y * TILE_SIZE;
                        player.x = player.startX;
                        player.y = player.startY;
                        tile = '.'; 
                    } else if (tile === 'C') {
                        coinsList.push({ x: x * TILE_SIZE, y: y * TILE_SIZE, collected: false });
                        tile = '.';
                    } else if (tile === 'E') {
                        enemiesList.push({ x: x * TILE_SIZE + 4, y: y * TILE_SIZE + 16, width: 24, height: 16, vx: -1, state: 'alive', squishTimer: 0 });
                        tile = '.';
                    } else if (tile === 'D') {
                        door = { x: x * TILE_SIZE + 4, y: y * TILE_SIZE, width: 24, height: 32 };
                        tile = '.';
                    }
                    row.push(tile);
                }
                map.push(row);
            }

            camera.x = Math.max(0, Math.min(player.startX + player.width/2 - canvas.width/2, levelWidth*TILE_SIZE - canvas.width));
        }

        function isSolid(tx, ty) {
            if (tx < 0 || tx >= levelWidth) return true;
            if (ty < 0 || ty >= levelHeight) return false;
            const tile = map[ty][tx];
            return tile === '#' || tile === 'G';
        }

        function checkCollision(px, py, pw, ph) {
            let tx1 = Math.floor(px / TILE_SIZE);
            let tx2 = Math.floor((px + pw - 0.1) / TILE_SIZE);
            let ty1 = Math.floor(py / TILE_SIZE);
            let ty2 = Math.floor((py + ph - 0.1) / TILE_SIZE);

            for (let ty = ty1; ty <= ty2; ty++) {
                for (let tx = tx1; tx <= tx2; tx++) {
                    if (isSolid(tx, ty)) return true;
                }
            }
            return false;
        }

        function isOverlapping(r1, r2) {
            return r1.x < r2.x + r2.width &&
                   r1.x + r1.width > r2.x &&
                   r1.y < r2.y + r2.height &&
                   r1.y + r1.height > r2.y;
        }

        function killPlayer() {
            if (player.invincibleTimer > 0) return;
            lives--;
            if (lives <= 0) {
                gameState = 'GAME_OVER';
            } else {
                player.x = player.startX;
                player.y = player.startY;
                player.vx = 0;
                player.vy = 0;
                player.invincibleTimer = 60; 
                camera.x = Math.max(0, Math.min(player.startX + player.width/2 - canvas.width/2, levelWidth*TILE_SIZE - canvas.width));
            }
        }

        function update() {
            frameCount++;
            if (gameState !== 'PLAYING') return;

            levelFrames++;
            if (player.invincibleTimer > 0) player.invincibleTimer--;

            // Coyote Timer Logic
            if (player.grounded) player.coyoteTimer = 6;
            else if (player.coyoteTimer > 0) player.coyoteTimer--;

            // Horizontal motion
            if (keys.left) player.vx = -WALK_SPEED;
            else if (keys.right) player.vx = WALK_SPEED;
            else player.vx = 0;

            if (player.vx > 0) player.facing = 1;
            if (player.vx < 0) player.facing = -1;

            // Jumping
            if (keys.jump && player.coyoteTimer > 0) {
                player.vy = JUMP_VELOCITY;
                player.grounded = false;
                player.coyoteTimer = 0;
            }

            // Gravity
            player.vy += GRAVITY;
            if (player.vy > TERMINAL_VELOCITY) player.vy = TERMINAL_VELOCITY;

            // Horizontal Collision
            player.x += player.vx;
            if (checkCollision(player.x, player.y, player.width, player.height)) {
                if (player.vx > 0) player.x = Math.floor((player.x + player.width) / TILE_SIZE) * TILE_SIZE - player.width;
                else if (player.vx < 0) player.x = Math.floor(player.x / TILE_SIZE) * TILE_SIZE + TILE_SIZE;
                player.vx = 0;
            }

            // Vertical Collision
            player.grounded = false;
            player.y += player.vy;
            if (checkCollision(player.x, player.y, player.width, player.height)) {
                if (player.vy > 0) {
                    player.y = Math.floor((player.y + player.height) / TILE_SIZE) * TILE_SIZE - player.height;
                    player.grounded = true;
                } else if (player.vy < 0) {
                    player.y = Math.floor(player.y / TILE_SIZE) * TILE_SIZE + TILE_SIZE;
                }
                player.vy = 0;
            }

            // Fall off bottom check
            if (player.y > canvas.height + 100) killPlayer();

            // Move Enemies
            for (let e of enemiesList) {
                if (e.state === 'dead') continue;
                if (e.state === 'alive') {
                    let nextX = e.x + e.vx;
                    let nextTx = Math.floor((e.vx > 0 ? nextX + e.width : nextX) / TILE_SIZE);
                    let currentTy = Math.floor((e.y + e.height - 1) / TILE_SIZE);
                    let floorTy = currentTy + 1;

                    if (isSolid(nextTx, currentTy) || !isSolid(nextTx, floorTy)) e.vx *= -1; 
                    else e.x += e.vx;
                } else if (e.state === 'squished') {
                    e.squishTimer--;
                    if (e.squishTimer <= 0) e.state = 'dead';
                }
            }

            // Coin collection
            for (let c of coinsList) {
                if (!c.collected && isOverlapping(player, { x: c.x + 8, y: c.y + 8, width: 16, height: 16 })) {
                    c.collected = true;
                    coinsCount++;
                    currentLevelCoins++;
                    score += 50;
                }
            }

            // Enemy collision
            for (let e of enemiesList) {
                if (e.state === 'alive' && isOverlapping(player, e)) {
                    if (player.vy > 0 && player.y + player.height - player.vy <= e.y + 8) {
                        e.state = 'squished';
                        e.squishTimer = 30;
                        player.vy = -8; 
                        score += 100;
                        currentLevelEnemiesKilled++;
                    } else {
                        killPlayer();
                    }
                }
            }

            // Hazard collision (Spikes)
            let tx1 = Math.floor(player.x / TILE_SIZE);
            let tx2 = Math.floor((player.x + player.width - 0.1) / TILE_SIZE);
            let ty1 = Math.floor(player.y / TILE_SIZE);
            let ty2 = Math.floor((player.y + player.height - 0.1) / TILE_SIZE);
            for (let ty = ty1; ty <= ty2; ty++) {
                for (let tx = tx1; tx <= tx2; tx++) {
                    if (tx >= 0 && tx < levelWidth && ty >= 0 && ty < levelHeight) {
                        if (map[ty][tx] === 'S') killPlayer();
                    }
                }
            }

            // Door logic
            if (door && isOverlapping(player, door)) {
                let timeInSeconds = Math.floor(levelFrames / 60);
                let timeBonus = Math.max(0, (60 - timeInSeconds) * 10);
                let levelBonus = 500;
                
                levelStats.coins = currentLevelCoins;
                levelStats.enemies = currentLevelEnemiesKilled;
                levelStats.time = timeInSeconds;
                levelStats.timeBonus = timeBonus;
                levelStats.levelBonus = levelBonus;
                
                score += timeBonus + levelBonus;
                levelStats.totalScore = score;
                
                gameState = 'LEVEL_COMPLETE';
            }

            // Smooth Camera follow
            let targetCamX = player.x + player.width / 2 - canvas.width / 2;
            if (targetCamX < 0) targetCamX = 0;
            const maxCameraX = Math.max(0, levelWidth * TILE_SIZE - canvas.width);
            if (targetCamX > maxCameraX) targetCamX = maxCameraX;
            
            camera.x += (targetCamX - camera.x) * 0.1;
            // Strict bounds clamping
            if (camera.x < 0) camera.x = 0;
            if (camera.x > maxCameraX) camera.x = maxCameraX;
        }

        function drawBackground() {
            let px = camera.x * 0.3; // parallax translation speed modifier
            
            if (currentLevelIndex === 0) {
                // Sky Gradient
                let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, '#88ccff');
                grad.addColorStop(1, '#ffffff');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Clouds
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                for(let i=0; i<10; i++) {
                    let cx = ((i * 150 - px) % 1500 + 1500) % 1500 - 200;
                    let cy = 50 + (i * 37) % 150;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 30, 0, Math.PI*2);
                    ctx.arc(cx + 25, cy - 10, 40, 0, Math.PI*2);
                    ctx.arc(cx + 50, cy, 30, 0, Math.PI*2);
                    ctx.fill();
                }
            } else if (currentLevelIndex === 1) {
                // Cavern Dark Gradient
                let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, '#222');
                grad.addColorStop(1, '#0a0a0a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Stalactites and Stalagmites
                ctx.fillStyle = '#333';
                for(let i=0; i<15; i++) {
                    let cx = ((i * 120 - px) % 1500 + 1500) % 1500 - 200;
                    // top
                    ctx.beginPath();
                    ctx.moveTo(cx, 0);
                    ctx.lineTo(cx + 40, 150 + (i*41)%100);
                    ctx.lineTo(cx + 80, 0);
                    ctx.fill();
                    
                    // bottom
                    let cy = canvas.height;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(cx + 30, cy - 100 - (i*31)%80);
                    ctx.lineTo(cx + 60, cy);
                    ctx.fill();
                }
            } else if (currentLevelIndex === 2) {
                // Sky Fortress Gradient
                let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, '#44bbff');
                grad.addColorStop(1, '#aaddff');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Distant floating platforms
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                for(let i=0; i<10; i++) {
                    let cx = ((i * 200 - px) % 1500 + 1500) % 1500 - 200;
                    let cy = 100 + (i * 87) % 200;
                    ctx.fillRect(cx, cy, 100 + (i*33)%50, 20);
                }
            }
        }

        function draw() {
            if (gameState === 'TITLE_SCREEN') {
                frameCount++;
                
                // Pretty gradient
                let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, '#2266aa');
                grad.addColorStop(1, '#113355');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.textAlign = 'center';
                
                // Title
                ctx.font = 'bold 64px sans-serif';
                ctx.fillStyle = '#111';
                ctx.fillText('PIXEL PLATFORMER', canvas.width / 2 + 4, 124);
                ctx.fillStyle = '#ffcc00';
                ctx.fillText('PIXEL PLATFORMER', canvas.width / 2, 120);

                // Player preview
                ctx.save();
                ctx.translate(canvas.width / 2, 220);
                ctx.scale(2, 2); 
                
                ctx.fillStyle = '#4488ff';
                ctx.fillRect(-16, 0, 32, 40);
                ctx.fillStyle = '#ffcc88';
                ctx.fillRect(0, 4, 16, 16);
                ctx.fillStyle = '#333';
                ctx.fillRect(-14, 32, 10, 8);
                ctx.fillRect(4, 32, 10, 8);
                ctx.restore();
                
                ctx.font = '24px sans-serif';
                ctx.fillStyle = (Math.floor(frameCount / 30) % 2 === 0) ? '#fff' : '#aaa';
                ctx.fillText('Press SPACE to Start', canvas.width / 2, 380);
                return;
            }

            // Draw Background Parallax
            drawBackground();

            const startX = Math.floor(camera.x / TILE_SIZE);
            const endX = Math.floor((camera.x + canvas.width) / TILE_SIZE);

            // Draw tiles
            for (let y = 0; y < levelHeight; y++) {
                for (let x = startX; x <= endX; x++) {
                    if (x < 0 || x >= levelWidth) continue;
                    
                    let tile = map[y][x];
                    let drawX = x * TILE_SIZE - camera.x;
                    let drawY = y * TILE_SIZE;

                    if (tile === '#' || tile === 'G') {
                        ctx.fillStyle = '#8B5E3C';
                        ctx.fillRect(drawX, drawY, TILE_SIZE, TILE_SIZE);
                        ctx.strokeStyle = '#5A3A22';
                        ctx.strokeRect(drawX, drawY, TILE_SIZE, TILE_SIZE);
                    }
                    if (tile === 'G') {
                        ctx.fillStyle = '#44aa44';
                        ctx.fillRect(drawX, drawY, TILE_SIZE, 8);
                    }
                    if (tile === 'S') { 
                        ctx.fillStyle = '#888';
                        ctx.beginPath();
                        ctx.moveTo(drawX + 16, drawY);
                        ctx.lineTo(drawX + 32, drawY + 32);
                        ctx.lineTo(drawX, drawY + 32);
                        ctx.fill();
                    }
                }
            }

            // Draw Door
            if (door) {
                ctx.fillStyle = '#8855aa';
                ctx.fillRect(door.x - camera.x, door.y, door.width, door.height);
            }

            // Draw coins
            for (let c of coinsList) {
                if (!c.collected) {
                    const shimmer = (frameCount % 30 < 15) ? 6 : 8; 
                    ctx.fillStyle = '#ffcc00';
                    ctx.beginPath();
                    ctx.arc(c.x + 16 - camera.x, c.y + 16, shimmer, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Draw Enemies
            for (let e of enemiesList) {
                if (e.state === 'dead') continue;
                let ex = e.x - camera.x;
                ctx.fillStyle = '#cc3333';
                if (e.state === 'squished') ctx.fillRect(ex, e.y + e.height/2, e.width, e.height / 2);
                else ctx.fillRect(ex, e.y, e.width, e.height);
            }

            // Draw player
            let px = player.x - camera.x;
            let py = player.y;

            ctx.save();
            if (player.invincibleTimer > 0 && Math.floor(frameCount / 4) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }

            ctx.translate(px + player.width/2, py);
            ctx.scale(player.facing, 1);
            
            let bx = -16;

            // Body
            ctx.fillStyle = '#4488ff';
            ctx.fillRect(bx, 0, player.width, player.height);
            // Face
            ctx.fillStyle = '#ffcc88';
            ctx.fillRect(bx + 16, 4, 16, 16);
            
            // Walking animation
            let jumpOffset = 0;
            let walkOffset1 = 0;
            let walkOffset2 = 0;

            if (!player.grounded) {
                jumpOffset = -4; // pull legs up slightly when jumping
            } else if (player.vx !== 0) {
                if (Math.floor(frameCount / 8) % 2 === 0) {
                    walkOffset1 = 4;
                    walkOffset2 = -2;
                } else {
                    walkOffset1 = -2;
                    walkOffset2 = 4;
                }
            }

            // Shoes
            ctx.fillStyle = '#333';
            ctx.fillRect(bx + 2, 32 - walkOffset1 + jumpOffset, 10, 8); 
            ctx.fillRect(bx + 20, 32 - walkOffset2 + jumpOffset, 10, 8); 

            ctx.restore();

            // Draw HUD
            ctx.textAlign = 'left';
            
            // Coins
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath();
            ctx.arc(20, 20, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px sans-serif';
            ctx.fillText(coinsCount, 35, 26);

            // Level Name
            ctx.textAlign = 'center';
            ctx.fillText(levelName, canvas.width / 2, 26);

            // Lives and Score
            ctx.textAlign = 'right';
            let hearts = '';
            for(let i = 0; i < lives; i++) hearts += '♥';
            ctx.fillStyle = '#f44';
            ctx.fillText(hearts, canvas.width - 120, 26);
            ctx.fillStyle = '#fff';
            ctx.fillText(String(score).padStart(5, '0'), canvas.width - 20, 26);

            // Draw Overlays
            if (gameState !== 'PLAYING') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.textAlign = 'center';

                if (gameState === 'LEVEL_COMPLETE') {
                    ctx.font = 'bold 36px sans-serif';
                    ctx.fillStyle = '#4488ff';
                    ctx.fillText('LEVEL COMPLETE!', canvas.width / 2, 120);
                    
                    ctx.font = '20px sans-serif';
                    ctx.fillStyle = '#fff';
                    ctx.fillText(`Coins Collected: ${levelStats.coins} x 50`, canvas.width / 2, 180);
                    ctx.fillText(`Enemies Defeated: ${levelStats.enemies} x 100`, canvas.width / 2, 220);
                    ctx.fillText(`Time Bonus: ${levelStats.timeBonus} (Time: ${levelStats.time}s)`, canvas.width / 2, 260);
                    ctx.fillText(`Level Bonus: ${levelStats.levelBonus}`, canvas.width / 2, 300);
                    
                    ctx.font = 'bold 24px sans-serif';
                    ctx.fillStyle = '#ffcc00';
                    ctx.fillText(`Total Score: ${levelStats.totalScore}`, canvas.width / 2, 350);
                    
                    ctx.font = '16px sans-serif';
                    ctx.fillStyle = (Math.floor(frameCount / 30) % 2 === 0) ? '#fff' : '#aaa';
                    ctx.fillText('Press SPACE to continue', canvas.width / 2, 400);
                } 
                else if (gameState === 'GAME_OVER') {
                    ctx.font = 'bold 48px sans-serif';
                    ctx.fillStyle = '#cc3333';
                    ctx.fillText('GAME OVER', canvas.width / 2, 200);
                    ctx.font = '24px sans-serif';
                    ctx.fillStyle = '#fff';
                    ctx.fillText(`Total Score: ${score}`, canvas.width / 2, 250);
                    
                    ctx.font = '16px sans-serif';
                    ctx.fillStyle = (Math.floor(frameCount / 30) % 2 === 0) ? '#fff' : '#aaa';
                    ctx.fillText('Press SPACE to Try Again', canvas.width / 2, 320);
                }
                else if (gameState === 'WIN') {
                    ctx.font = 'bold 48px sans-serif';
                    ctx.fillStyle = '#ffcc00';
                    ctx.fillText('YOU WIN!', canvas.width / 2, 200);
                    ctx.font = '24px sans-serif';
                    ctx.fillStyle = '#fff';
                    ctx.fillText(`Final Score: ${score}`, canvas.width / 2, 250);
                    
                    ctx.font = '16px sans-serif';
                    ctx.fillStyle = (Math.floor(frameCount / 30) % 2 === 0) ? '#fff' : '#aaa';
                    ctx.fillText('Press SPACE to Play Again', canvas.width / 2, 320);
                }
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
